<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISA AI - Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- ═══════════ SIDEBAR ═══════════ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    New Chat
                </button>
            </div>

            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <input type="text" id="searchInput" placeholder="Search chats..." oninput="searchChats(this.value)">
            </div>

            <div class="sessions-list" id="sessionsList">
                <!-- Sessions populated by JS -->
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">{{ current_user.username[0]|upper }}</div>
                    <div class="user-details">
                        <span class="user-name">{{ current_user.username }}</span>
                        <span class="user-type">{{ current_user.partner_type }}</span>
                    </div>
                </div>
                <a href="/logout" class="logout-btn" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
            </div>
        </aside>

        <!-- ═══════════ MAIN CHAT AREA ═══════════ -->
        <main class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <h2 id="chatTitle">LISA AI</h2>
                <div class="header-actions">
                    <button class="icon-btn" onclick="exportChat('text')" title="Export chat">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 10v3a1 1 0 01-1 1H3a1 1 0 01-1-1v-3M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- Welcome message (shown when no messages) -->
                <div class="welcome" id="welcomeScreen">
                    <div class="welcome-logo">LISA</div>
                    <h2>How can I help you today?</h2>
                    <p>I'm your LAMF knowledge assistant, marketing co-pilot, and growth enabler.</p>
                    <div class="example-queries">
                        <button class="example-btn" onclick="sendExample(this)">What is Loan Against Mutual Funds?</button>
                        <button class="example-btn" onclick="sendExample(this)">What are the eligibility criteria for LAMF?</button>
                        <button class="example-btn" onclick="sendExample(this)">Create a WhatsApp message for LAMF promotion</button>
                        <button class="example-btn" onclick="sendExample(this)">What are the interest rates and fees?</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Message LISA..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2L7 9M14 2l-5 12-2-5-5-2 12-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
                <p class="disclaimer">LISA can make mistakes. Always verify financial information with official sources.</p>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
